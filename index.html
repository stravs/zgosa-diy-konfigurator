<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Zgosa DIY Konfigurator</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.177.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.177.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Zgosa DIY Konfigurator</h1>
        <div class="topbar-actions">
          <button id="new-scene" type="button">Clear</button>
          <button id="save-json" type="button">Save</button>
          <button id="load-json" type="button">Load</button>
          <label class="topbar-toggle">
            <input id="toggle-grid" type="checkbox" />
            Grid
          </label>
          <label class="topbar-toggle">
            <input id="toggle-edit-base" type="checkbox" />
            Edit Base
          </label>
          <input id="load-json-input" type="file" accept="application/json,.json" hidden />
        </div>
        <div id="status">Ground hit: —</div>
      </header>
      <div class="workspace">
        <aside class="left-panel">
          <h2>Warehouse</h2>

          <details class="object-folder" open>
            <summary>Flat</summary>
            <button data-add-object="box">Box</button>
            <button data-add-object="bank">Bank</button>
            <button data-add-object="pyramid">Pyramid</button>
            <button data-add-object="stairs">Stairs</button>
          </details>

          <details class="object-folder" open>
            <summary>Curved</summary>
            <button data-add-object="quarterPipe">Quarter Pipe</button>
            <button data-add-object="halfPipe">Half Pipe</button>
            <button data-add-object="corner">Corner</button>
            <button data-add-object="hip">Hip</button>
            <button data-add-object="volcano">Volcano</button>
            <button data-add-object="boob">Boob</button>
          </details>

          <details class="object-folder" open>
            <summary>Slide</summary>
            <button data-add-object="rail">Rail</button>
            <button data-add-object="ledge">Ledge</button>
          </details>

          <details class="object-folder" open>
            <summary>Other</summary>
            <button data-add-object="skater">Skater</button>
          </details>
        </aside>
        <main id="app"></main>
        <aside class="right-panel">
          <h2>Scene</h2>
          <div id="no-selection" class="layers-panel">
            <h3>Scene Objects</h3>
            <div id="layers-list" class="layers-list"></div>
          </div>
        </aside>
      </div>
      <footer class="bottombar">
        <button id="mobile-move" class="mobile-tool" type="button">Move</button>
        <button id="mobile-rotate" class="mobile-tool" type="button">Rotate</button>
        <button id="mobile-measure" class="mobile-tool" type="button">Measure</button>
        <button id="mobile-undo" class="mobile-tool" type="button">Undo</button>
        <button id="mobile-redo" class="mobile-tool" type="button">Redo</button>
        <button id="mobile-delete" class="mobile-tool danger" type="button">Delete</button>
        <span><kbd>Space</kbd> Move</span>
        <span><kbd>R</kbd> Rotate</span>
        <span><kbd>M</kbd> Measure</span>
        <span><kbd>Esc</kbd> Clear / Unselect</span>
        <span><kbd>Del</kbd> Delete</span>
        <span><kbd>Ctrl</kbd> + <kbd>D</kbd> Duplicate</span>
        <span><kbd>Ctrl</kbd> + <kbd>G</kbd> Group</span>
        <span><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>G</kbd> Ungroup</span>
      </footer>
    </div>
    <button id="objects-handle" class="drawer-handle drawer-handle-left" type="button" aria-label="Warehouse">📦</button>
    <button id="layers-handle" class="drawer-handle drawer-handle-right" type="button" aria-label="Scene">☰</button>
    <div id="context-menu" class="context-menu" hidden>
      <button data-context-add="box" type="button">Add Box</button>
      <button data-context-add="ledge" type="button">Add Ledge</button>
      <button data-context-add="quarterPipe" type="button">Add Quarter Pipe</button>
      <button data-context-add="halfPipe" type="button">Add Half Pipe</button>
      <button data-context-add="corner" type="button">Add Corner</button>
      <button data-context-add="hip" type="button">Add Hip</button>
      <button data-context-add="volcano" type="button">Add Volcano</button>
      <button data-context-add="boob" type="button">Add Boob</button>
      <button data-context-add="bank" type="button">Add Bank</button>
      <button data-context-add="pyramid" type="button">Add Pyramid</button>
      <button data-context-add="rail" type="button">Add Rail</button>
      <button data-context-add="stairs" type="button">Add Stairs</button>
      <button data-context-add="skater" type="button">Add Skater</button>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
