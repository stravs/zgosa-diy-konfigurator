<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skate Park Configurator</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.177.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.177.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Skate Park Configurator</h1>
        <div class="topbar-actions">
          <button id="new-scene" type="button">New</button>
          <button id="save-json" type="button">Save JSON</button>
          <button id="load-json" type="button">Load JSON</button>
          <input id="load-json-input" type="file" accept="application/json,.json" hidden />
        </div>
        <div id="status">Ground hit: —</div>
      </header>
      <div class="workspace">
        <aside class="left-panel">
          <h2>Objects</h2>
          <button data-add-object="box">Box</button>
          <button data-add-object="ledge">Ledge</button>
          <button data-add-object="quarterPipe">Quarter Pipe</button>
        </aside>
        <main id="app"></main>
        <aside class="right-panel">
          <h2>Properties</h2>
          <p id="no-selection">Select an object.</p>
          <form id="properties-form" hidden>
            <label>
              Type
              <input id="prop-type" type="text" disabled />
            </label>
            <label>
              X
              <input id="prop-x" data-prop="position.x" type="number" step="0.1" />
            </label>
            <label>
              Z
              <input id="prop-z" data-prop="position.z" type="number" step="0.1" />
            </label>
            <label>
              Y
              <input id="prop-y" data-prop="position.y" type="number" step="0.1" />
            </label>
            <label>
              Rotation
              <input id="prop-rotation" data-prop="rotation.y" type="number" step="15" />
            </label>
            <label>
              Width
              <input id="prop-width" data-prop="params.width" type="number" min="0.1" step="0.1" />
            </label>
            <label>
              Height
              <input id="prop-height" data-prop="params.height" type="number" min="0.1" step="0.1" />
            </label>
            <label>
              Depth
              <input id="prop-depth" data-prop="params.depth" type="number" min="0.1" step="0.1" />
            </label>
            <div class="property-actions">
              <button id="move-tool" type="button">Move Tool</button>
              <button id="rotate-tool" type="button">Rotate Tool</button>
              <button id="rotate-selected" type="button">Rotate 90°</button>
              <button id="duplicate-selected" type="button">Duplicate</button>
              <button id="delete-selected" type="button" class="danger">Delete</button>
            </div>
          </form>
        </aside>
      </div>
    </div>
    <div id="context-menu" class="context-menu" hidden>
      <button data-context-add="box" type="button">Add Box</button>
      <button data-context-add="ledge" type="button">Add Ledge</button>
      <button data-context-add="quarterPipe" type="button">Add Quarter Pipe</button>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
