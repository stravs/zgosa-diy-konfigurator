<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skate Park Configurator</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.177.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.177.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Skate Park Configurator</h1>
        <div class="topbar-actions">
          <button id="new-scene" type="button">New</button>
          <button id="save-json" type="button">Save JSON</button>
          <button id="load-json" type="button">Load JSON</button>
          <input id="load-json-input" type="file" accept="application/json,.json" hidden />
        </div>
        <div id="status">Ground hit: —</div>
      </header>
      <div class="workspace">
        <aside class="left-panel">
          <h2>Objects</h2>
          <button data-add-object="box">Box</button>
          <button data-add-object="ledge">Ledge</button>
          <button data-add-object="quarterPipe">Quarter Pipe</button>
          <button data-add-object="halfPipe">Half Pipe</button>
          <button data-add-object="corner">Corner</button>
          <button data-add-object="hip">Hip</button>
          <button data-add-object="volcano">Volcano</button>
          <button data-add-object="bank">Bank</button>
          <button data-add-object="pyramid">Pyramid</button>
          <button data-add-object="rail">Rail</button>
          <button data-add-object="stairs">Stairs</button>
          <button data-add-object="skater">Skater</button>
        </aside>
        <main id="app"></main>
        <aside class="right-panel">
          <h2>Properties</h2>
          <p id="no-selection">Select an object.</p>
          <form id="properties-form" hidden>
            <section class="property-section">
              <h3>Position Data</h3>
              <label>
                X
                <input id="prop-x" data-prop="position.x" type="number" step="0.01" />
              </label>
              <label>
                Y
                <input id="prop-y" data-prop="position.y" type="number" step="0.01" />
              </label>
              <label>
                Z
                <input id="prop-z" data-prop="position.z" type="number" step="0.01" />
              </label>
              <label>
                Rotation
                <input id="prop-rotation" data-prop="rotation.y" type="number" step="15" />
              </label>
            </section>

            <section class="property-section">
              <h3>Object Data</h3>
              <label>
                Type
                <input id="prop-type" type="text" disabled />
              </label>
              <label id="prop-width-row">
                Width
                <input id="prop-width" data-prop="params.width" type="number" min="0.1" step="0.1" />
              </label>
              <label>
                <span id="prop-height-label">Height</span>
                <input id="prop-height" data-prop="params.height" type="number" min="0.01" step="0.01" />
              </label>
              <label id="prop-depth-row">
                <span id="prop-depth-label">Depth</span>
                <input id="prop-depth" data-prop="params.depth" type="number" min="0.1" step="0.1" />
              </label>
              <label id="prop-deck-depth-row" hidden>
                Deck Depth
                <input id="prop-deck-depth" data-prop="params.deckDepth" type="number" min="0" step="0.1" />
              </label>
              <label id="prop-flat-length-row" hidden>
                Flat Length
                <input id="prop-flat-length" data-prop="params.flatLength" type="number" min="0" step="0.1" />
              </label>
              <label id="prop-degrees-row" hidden>
                <span id="prop-degrees-label">Degrees</span>
                <input id="prop-degrees" data-prop="params.degrees" type="number" min="1" max="180" step="1" />
              </label>
              <label id="prop-top-radius-row" hidden>
                <span id="prop-top-radius-label">Top Radius</span>
                <input id="prop-top-radius" data-prop="params.topRadius" type="number" min="0" step="0.1" />
              </label>
              <label id="prop-step-count-row" hidden>
                Number of Stairs
                <input id="prop-step-count" data-prop="params.stepCount" type="number" min="1" step="1" />
              </label>
            </section>

            <div class="property-actions">
              <button id="delete-selected" type="button" class="danger">Delete</button>
            </div>
          </form>
        </aside>
      </div>
      <footer class="bottombar">
        <span><kbd>Space</kbd> Move</span>
        <span><kbd>R</kbd> Rotate</span>
        <span><kbd>M</kbd> Measure</span>
        <span><kbd>Esc</kbd> Clear / Unselect</span>
        <span><kbd>Del</kbd> Delete</span>
        <span><kbd>Ctrl</kbd> + <kbd>D</kbd> Duplicate</span>
      </footer>
    </div>
    <div id="context-menu" class="context-menu" hidden>
      <button data-context-add="box" type="button">Add Box</button>
      <button data-context-add="ledge" type="button">Add Ledge</button>
      <button data-context-add="quarterPipe" type="button">Add Quarter Pipe</button>
      <button data-context-add="halfPipe" type="button">Add Half Pipe</button>
      <button data-context-add="corner" type="button">Add Corner</button>
      <button data-context-add="hip" type="button">Add Hip</button>
      <button data-context-add="volcano" type="button">Add Volcano</button>
      <button data-context-add="bank" type="button">Add Bank</button>
      <button data-context-add="pyramid" type="button">Add Pyramid</button>
      <button data-context-add="rail" type="button">Add Rail</button>
      <button data-context-add="stairs" type="button">Add Stairs</button>
      <button data-context-add="skater" type="button">Add Skater</button>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
